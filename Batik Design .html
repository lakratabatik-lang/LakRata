<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batik Designer Pro</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f2f2f2;
}

header{
background:#1b1b1b;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
padding:20px;
}

.sidebar{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);

}

.sidebar h2{
margin-bottom:15px;
}

.uploadBox{

border:2px dashed #999;
padding:25px;
text-align:center;
border-radius:10px;
margin-bottom:20px;

}

input[type=file]{

width:100%;

}

.colorSection{

margin-top:20px;

}

.colorSection label{

display:block;
margin-bottom:10px;

}

.colorSection input{

width:100%;
height:50px;
border:none;

}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#0078ff;
color:white;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#005dcc;

}

.workspace{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);

}

canvas{

width:100%;
height:auto;
border:1px solid #ddd;

}

</style>

</head>

<body>

<header>

BATIK DESIGNER PRO

</header>

<div class="container">

<div class="sidebar">

<h2>Upload Pattern</h2>

<div class="uploadBox">

<input type="file" id="upload" accept="image/*">

</div>

<div class="colorSection">

<label>Select Colour</label>

<input type="color" id="colorPicker" value="#ff0000">

<button id="applyColor">
Apply Colour
</button>

<button id="reset">
Reset
</button>

<button id="download">
Download PNG
</button>

</div>

</div>

<div class="workspace">

<canvas id="canvas" width="900" height="900"></canvas>

</div>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const upload=document.getElementById("upload");

let img=new Image();

upload.addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(event){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=event.target.result;

}

reader.readAsDataURL(e.target.files[0]);

});

document.getElementById("download").onclick=function(){

const link=document.createElement("a");

link.download="batik-design.png";

link.href=canvas.toDataURL();

link.click();

}

</script>

</body>

</html>
